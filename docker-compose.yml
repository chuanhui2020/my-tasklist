services:
  # MySQL 数据库服务
  db:
    image: mysql:8.4
    container_name: tasklist-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tasklist_db}
      MYSQL_USER: ${MYSQL_USER:-taskuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-taskpassword}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-exporter/init-exporter-user.sql:/docker-entrypoint-initdb.d/init-exporter-user.sql:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - tasklist_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone='+08:00'
    # 资源限制（1C2G 服务器优化）
    deploy:
      resources:
        limits:
          cpus: '0.5'      # 最多使用 50% CPU
          memory: 512M     # 最多使用 512MB 内存
        reservations:
          cpus: '0.25'     # 保留 25% CPU
          memory: 256M     # 保留 256MB 内存

  # FastAPI 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tasklist-backend
    restart: always
    environment:
      # 数据库配置
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-taskuser}:${MYSQL_PASSWORD:-taskpassword}@db:3306/${MYSQL_DATABASE:-tasklist_db}?charset=utf8mb4
      # 应用配置
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      # AI 服务配置
      AI_SERVICE: ${AI_SERVICE:-compatible}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Python 配置
      PYTHONUNBUFFERED: 1
      TZ: Asia/Shanghai
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tasklist_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # 资源限制（1C2G 服务器优化）
    deploy:
      resources:
        limits:
          cpus: '0.3'      # 最多使用 30% CPU
          memory: 384M     # 最多使用 384MB 内存
        reservations:
          cpus: '0.15'     # 保留 15% CPU
          memory: 192M     # 保留 192MB 内存

  # Nginx + Vue 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: tasklist-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - grafana
    networks:
      - tasklist_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    # 资源限制（1C2G 服务器优化）
    deploy:
      resources:
        limits:
          cpus: '0.2'      # 最多使用 20% CPU
          memory: 128M     # 最多使用 128MB 内存
        reservations:
          cpus: '0.1'      # 保留 10% CPU
          memory: 64M      # 保留 64MB 内存

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: tasklist-prometheus
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - tasklist_network
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M

  # Grafana 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: tasklist-grafana
    restart: always
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - tasklist_network
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M

  # MySQL Exporter
  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: tasklist-mysql-exporter
    restart: always
    volumes:
      - ./mysql-exporter/.my.cnf:/etc/.my.cnf:ro
    command:
      - '--config.my-cnf=/etc/.my.cnf'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tasklist_network
    deploy:
      resources:
        limits:
          cpus: '0.05'
          memory: 32M
        reservations:
          cpus: '0.02'
          memory: 16M

volumes:
  mysql_data:
    name: tasklist_mysql_data
  prometheus_data:
    name: tasklist_prometheus_data
  grafana_data:
    name: tasklist_grafana_data

networks:
  tasklist_network:
    name: tasklist_network
    driver: bridge
